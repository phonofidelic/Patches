name: PR Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore Patches.slnx

      - name: Build
        run: dotnet build Patches.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test Patches.Tests/Patches.Tests.csproj --no-build --configuration Release --verbosity normal
